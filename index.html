<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShareMe - Peer-to-Peer Resource Sharing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dev-console">
    <strong>Dev Console</strong>
    <div class="dev-controls">
      <label for="user-switcher">Active User:</label>
      <select id="user-switcher">
        <option value="u1">Ahmed</option>
        <option value="u2">Sara</option>
        <option value="u3">Tareq</option>
      </select>
    </div>
    <button id="reset-db" class="dev-btn">Reset Database</button>
  </div>

  <div class="device-mockup">
    <div class="device-notch"></div>
    <div id="toast-container"></div>

    <main class="app-view" id="app-view">
      
      <header class="app-header">
        <div class="header-content">
          <div class="avatar" id="user-avatar">A</div>
          <div class="greeting-node">
            <span class="greeting-sub">Good morning,</span>
            <h1 class="greeting-name" id="user-name">Ahmed</h1>
          </div>
        </div>
        <div class="trust-pill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--accent)">
            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
          </svg>
          <span id="user-karma" class="karma-tally">120</span>
        </div>
      </header>

      <section class="category-track">
        <div class="category-scroll" id="category-scroll">
          <button class="cat-pill active" data-cat="All">
            <div class="cat-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            </div>
            All
          </button>
          <button class="cat-pill" data-cat="Tools">
            <div class="cat-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            </div>
            Tools
          </button>
          <button class="cat-pill" data-cat="Electronics">
            <div class="cat-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/></svg>
            </div>
            Tech
          </button>
          <button class="cat-pill" data-cat="Leisure">
            <div class="cat-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
            </div>
            Leisure
          </button>
        </div>
      </section>

      <section class="segmented-control-container">
        <div class="segmented-control">
          <div class="segment-bg" id="segment-bg"></div>
          <button class="segment-btn active" data-tab="explore">Explore</button>
          <button class="segment-btn" data-tab="mine">My Items</button>
          <button class="segment-btn" data-tab="borrowed">Borrowing</button>
        </div>
      </section>

      <section class="inventory-grid" id="inventory-grid">
        </section>

    </main>

    <button class="fab" id="fab-add">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    </button>

    <div class="overlay hidden" id="sheet-overlay">
      <div class="bottom-sheet" id="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-content" id="sheet-content">
          </div>
      </div>
    </div>

    <div class="modal hidden" id="add-modal">
      <div class="modal-header">
        <h2>Share New Item</h2>
        <button class="close-btn" id="close-modal">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <form class="modal-body" id="add-item-form">
        <div class="input-group">
          <label for="item-name">Item Name</label>
          <input type="text" id="item-name" placeholder="e.g. Sony Alpha Camera" required autocomplete="off">
        </div>
        <div class="input-group">
          <label for="item-category">Category</label>
          <select id="item-category" required>
            <option value="Tools">Tools</option>
            <option value="Electronics">Electronics</option>
            <option value="Leisure">Leisure</option>
            <option value="Vehicles">Vehicles</option>
          </select>
        </div>
        <div class="modal-reward">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--accent)"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          <span>Adding this item will reward you with <strong>+5 Karma</strong>.</span>
        </div>
        <button type="submit" class="btn-primary">Add to Inventory</button>
      </form>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
